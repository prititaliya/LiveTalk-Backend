name: AI Agent Review

on:
  workflow_dispatch:
    inputs:
      agent_branch:
        description: 'Branch of Code-Reviewer to use'
        required: false
        default: 'main'
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Print PR info
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "PR number: ${{ github.event.pull_request.number }}"
          echo "PR title: ${{ github.event.pull_request.title }}"
          echo "Base branch: ${{ github.event.pull_request.base.ref }}"
          echo "Head branch: ${{ github.event.pull_request.head.ref }}"
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "GITHUB_REF: $GITHUB_REF"
          echo "GITHUB_SHA: $GITHUB_SHA"

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Generate diff files
        run: |
          git diff --stat origin/${{ github.event.pull_request.base.ref }}...HEAD -- . \
            ':(exclude)full_diff.txt' \
            ':(exclude)final_summary.md' \
            ':(exclude)**/__pycache__/**' > diff_stat.txt

          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- . \
            ':(exclude)full_diff.txt' \
            ':(exclude)final_summary.md' \
            ':(exclude)**/__pycache__/**' > full_diff.txt

      - name: Debug diff info
        run: |
          echo "Stat size: $(wc -c < diff_stat.txt) bytes"
          echo "Diff size: $(wc -c < full_diff.txt) bytes"
          echo "Changed files:"
          git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- . \
            ':(exclude)full_diff.txt' \
            ':(exclude)final_summary.md' \
            ':(exclude)**/__pycache__/**' || true
          echo "Recent commits:"
          git log --oneline --decorate -n 10

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-inputs
          path: |
            diff_stat.txt
            full_diff.txt
          if-no-files-found: error
          overwrite: true

  add-or-overwrite-pr-comment:
    needs: review
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target repository code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout external agent repository
        uses: actions/checkout@v4
        with:
          repository: prititaliya/Code-Reviewer
          path: Code-Reviewer
          token: ${{ secrets.AGENT_REPO_PAT }}
          ref: ${{ inputs.agent_branch || 'main' }}

      - name: Download diff artifacts
        uses: actions/download-artifact@v5
        with:
          name: pr-review-inputs

      - name: Verify downloaded files
        run: |
          ls -lah
          echo "Stat size: $(wc -c < diff_stat.txt) bytes"
          echo "Diff size: $(wc -c < full_diff.txt) bytes"

      - name: Install Python dependencies
        run: pip install -r Code-Reviewer/requirement.txt

      - name: Fetch all PR comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --paginate \
            --jq '.[] | select(.user.login != "github-actions[bot]") | {body, type: "issue"}' > issue_comments.json

          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
            --paginate \
            --jq '.[] | select(.user.login != "github-actions[bot]") | {body, path, line, original_line, side, type: "review"}' > review_comments.json

          jq -s 'add' <(jq -s '.' issue_comments.json) <(jq -s '.' review_comments.json) > all_comments.json

      - name: Run AI review agent
        id: ai-review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEPENDENT_REPO: ${{ secrets.DEPENDENT_REPO }}
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
          GH_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          python3 Code-Reviewer/ai_review_agent.py \
            --diff-stats-file diff_stat.txt \
            --code-diff-file full_diff.txt \
            --comments-file all_comments.json
        working-directory: ${{ github.workspace }}

      - name: Prepend hidden marker to summary
        run: |
          echo "" | cat - final_summary.md > temp.md && mv temp.md final_summary.md

      - name: Find previous bot comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: ""

      - name: Add or overwrite PR comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body-path: final_summary.md

      - name: Print all comments
        run: cat all_comments.json